<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ghost Browser</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --accent-color: #2563eb;
            --border-color: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        /* Top Control Bar */
        .toolbar {
            background-color: var(--card-bg);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .toggle-group {
            display: flex;
            gap: 8px;
        }

        .btn-toggle {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-toggle.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Search Engine & Input Row */
        .search-container {
            display: flex;
            gap: 8px;
        }

        .engine-select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            outline: none;
        }

        .url-input {
            flex: 1;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
        }

        .btn-go {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Webview Iframe Container */
        .browser-viewport {
            flex: 1;
            width: 100%;
            background: white;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .placeholder-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="actions-row">
            <div class="brand">👻 Ghost Browser</div>
            <div class="toggle-group">
                <button id="btnDark" class="btn-toggle">🌙 Dark</button>
                <button id="btnAdblock" class="btn-toggle active">🛡️ AdBlock: ON</button>
            </div>
        </div>

        <div class="search-container">
            <select id="engineSelect" class="engine-select">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="duckduckgo">DuckDuckGo</option>
            </select>
            <input type="text" id="urlInput" class="url-input" placeholder="Search or type URL (e.g. youtube.com)..." autocomplete="off">
            <button id="btnGo" class="btn-go">👉</button>
        </div>
    </div>

    <div class="browser-viewport">
        <div id="placeholder" class="placeholder-screen">
            <p style="font-size: 1.2rem; font-weight: 600; opacity: 0.6;">No History Saved • Safe Browsing</p>
        </div>
        <iframe id="browserIframe" src="" allow="camera; microphone; geolocation; storage; autoplay; encrypted-media" allowfullscreen class="hidden"></iframe>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const btnGo = document.getElementById('btnGo');
        const iframe = document.getElementById('browserIframe');
        const placeholder = document.getElementById('placeholder');
        const engineSelect = document.getElementById('engineSelect');
        const btnDark = document.getElementById('btnDark');
        const btnAdblock = document.getElementById('btnAdblock');

        let adblockEnabled = true;

        // Dark Mode Toggle
        btnDark.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                btnDark.innerText = "🌙 Dark";
            } else {
                document.body.setAttribute('data-theme', 'dark');
                btnDark.innerText = "☀️ Light";
            }
        });

        // Adblock Toggle Toggle
        btnAdblock.addEventListener('click', () => {
            adblockEnabled = !adblockEnabled;
            if (adblockEnabled) {
                btnAdblock.classList.add('active');
                btnAdblock.innerText = "🛡️ AdBlock: ON";
            } else {
                btnAdblock.classList.remove('active');
                btnAdblock.innerText = "🔓 AdBlock: OFF";
            }
            // Reload iframe if active to update status
            if(iframe.src) loadUrl(urlInput.value);
        });

        // Navigation Logic
        function loadUrl(input) {
            if (!input) return;
            placeholder.classList.add('hidden');
            iframe.classList.remove('hidden');

            let targetUrl = "";
            
            // Check if input is a direct URL
            if (input.includes('.') && !input.includes(' ')) {
                targetUrl = input.startsWith('http') ? input : `https://${input}`;
            } else {
                // Multi Search Engine integration
                const engine = engineSelect.value;
                if (engine === 'google') {
                    targetUrl = `https://www.google.com/search?q=${encodeURIComponent(input)}`;
                } else if (engine === 'bing') {
                    targetUrl = `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
                } else if (engine === 'duckduckgo') {
                    targetUrl = `https://duckduckgo.com/?q=${encodeURIComponent(input)}`;
                }
            }

            // Simple client-side AdBlock wrapper via sandboxing override if enabled
            if (adblockEnabled) {
                // Blocks third party frame components inside native webview sandbox environments
                iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-downloads");
            } else {
                iframe.removeAttribute("sandbox");
            }

            iframe.src = targetUrl;
        }

        btnGo.addEventListener('click', () => loadUrl(urlInput.value));
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadUrl(urlInput.value);
        });

        // Strict No-History Logic (Clearing RAM allocations on unload)
        window.addEventListener('beforeunload', () => {
            iframe.src = "";
        });
    </script>
</body>
</html>

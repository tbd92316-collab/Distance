name: Build Distance Tracker APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub Code Pull Karna
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Latest Node.js Version Config
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Android build ke liye JDK 17 Standard config
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. JavaScript Engine Modules Install Karna
      - name: Install Dependencies
        run: npm install

      # 5. Native Code Bridge Initialize Karna
      - name: Initialize Capacitor & Add Android
        run: |
          npx cap init "GPS Odometer" "com.akash.gpsodometer" --web-dir=.
          npx cap add android

      # 6. Strict Background GPS Permissions Inject Karna
      - name: Inject GPS Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Fine Location & Coarse Location setup
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" \/>' $MANIFEST_PATH
          
          # Background Location access (Taaki phone lock hone par bhi trace ho sake)
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" \/>' $MANIFEST_PATH
          
          # Hardware standard verification
          sed -i '/<\/manifest>/i \    <uses-feature android:name="android.hardware.location.gps" android:required="true" \/>' $MANIFEST_PATH

      # 7. Web assets ko Build folder me Sync karna
      - name: Sync Code to Android Project
        run: npx cap sync android

      # 8. Gradle tool se Android App compile karna
      - name: Build Android APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      # 9. Finished APK Artifact safe zone me upload karna
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: GPS-Odometer-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          

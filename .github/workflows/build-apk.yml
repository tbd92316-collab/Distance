name: Build Ghost Browser APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor Project
        run: |
          npx cap init "Ghost Browser" "com.akash.ghostbrowser" --web-dir=www
          npx cap add android

      # App core permissions aur hardware accessibility inject karna
      - name: Inject Heavy Permissions & Media Controls
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Native Media, Download, Storage and Hardware Engine Access
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION" \/>' $MANIFEST_PATH
          
          # Hardware components declaration rules
          sed -i '/<\/manifest>/i \    <uses-feature android:name="android.hardware.camera" android:required="false" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-feature android:name="android.hardware.location.gps" android:required="false" \/>' $MANIFEST_PATH

      # Web assets inject aur Android build execute karna
      - name: Sync Web Source Assets
        run: npx cap sync android

      - name: Compile App via Gradle Tool
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Browser APK Production Build
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Browser-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
